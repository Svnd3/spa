<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wordly Dictionary</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="theme">
      <input type="checkbox" id="theme" />
      <label for="theme" class="toggle">🌙</label>
    </div>
    <header>
      <h1>Word<span>ly</span></h1>
      <h1>Diction<span>ary</span></h1>
      <p>busara</p>
    </header>
    <main>
      <form id="search-form">
        <input type="text" id="search-input" placeholder="What word would you like to know?☺️😁" aria-label="Word search input"/>
        <button type="submit" id="search-button">Find Out</button>
      </form>
      <div id="results" class="results" aria-live="polite"></div>
      <div id="saved-words" class="saved-words">
        <h2 class="saveword">Saved</h2>
        <div id="saved-list"></div>
      </div>
    </main>
    <div class="footer">
      <p>
        © 2026 Hezron San'de |
        <a href="https://github.com/Svnd3" target="_blank">Visit my GitHub</a>
      </p>
    </div>
    <script src="index.js" type="module"></script>
  </body>
</html>
